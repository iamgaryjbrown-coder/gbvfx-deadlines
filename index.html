<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBVFX — Deadline Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #12141a;
    --surface-alt: #181b23;
    --border: #1f2330;
    --text: #e2e4ea;
    --text-dim: #6b7084;
    --text-muted: #3d4155;
    --accent: #4e8cff;
    --past: #2a2d3a;
    --past-text: #3d4155;
    --crit: #ff3b4e;
    --crit-bg: rgba(255, 59, 78, 0.08);
    --warn: #ffaa2a;
    --warn-bg: rgba(255, 170, 42, 0.06);
    --ok: #2dd4a0;
    --ok-bg: rgba(45, 212, 160, 0.05);
    --clear: #4e8cff;
    --clear-bg: rgba(78, 140, 255, 0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: auto;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
  }

  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .project-block {
    margin-top: 2rem;
  }

  .project-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .project-title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 2px;
  }

  .schedule-ref {
    font-weight: 300;
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    text-transform: none;
  }

  .grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .grid-header {
    background: var(--surface-alt);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: center;
  }

  .grid-milestone {
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-dim);
    padding: 0.5rem 0.75rem;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .cell {
    background: var(--surface);
    padding: 0.4rem 0.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 54px;
    transition: background 0.2s;
  }

  .cell:hover {
    background: var(--surface-alt);
  }

  .cell .days {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1.25rem;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .cell .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.05em;
    margin-top: 3px;
    opacity: 0.5;
  }

  .cell .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* States */
  .cell.past       { background: var(--past); }
  .cell.past .days  { color: var(--past-text); }
  .cell.past .date  { color: var(--past-text); }
  .cell.past .label { color: var(--past-text); }

  .cell.crit        { background: var(--crit-bg); }
  .cell.crit .days  { color: var(--crit); }
  .cell.crit .label { color: var(--crit); }

  .cell.warn        { background: var(--warn-bg); }
  .cell.warn .days  { color: var(--warn); }
  .cell.warn .label { color: var(--warn); }

  .cell.ok          { background: var(--ok-bg); }
  .cell.ok .days    { color: var(--ok); }
  .cell.ok .label   { color: var(--ok); }

  .cell.clear       { background: var(--clear-bg); }
  .cell.clear .days { color: var(--clear); }
  .cell.clear .label{ color: var(--clear); }

  .today-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
  }

  .legend {
    display: flex;
    gap: 1.2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  .next-up {
    margin-top: 1.25rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .next-up.global {
    margin-top: 1rem;
    border-color: #2a2e3d;
    background: linear-gradient(135deg, rgba(18, 20, 26, 0.97) 0%, rgba(24, 27, 35, 0.97) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 0 0 6px 6px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .next-up-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.6rem;
  }

  .next-item {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.3rem 0;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    padding-left: 0.3rem;
    padding-right: 0.3rem;
    margin-left: -0.3rem;
    margin-right: -0.3rem;
  }

  .next-item:hover {
    background: rgba(78, 140, 255, 0.06);
  }

  .next-item .ni-days {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    min-width: 4ch;
    text-align: right;
  }

  .next-item .ni-detail {
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .next-item .ni-detail strong {
    color: var(--text);
    font-weight: 600;
  }

  .ni-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(78, 140, 255, 0.12);
    color: var(--accent);
    margin-left: 0.4rem;
  }

  .ni-sg-icon {
    font-size: 0.55rem;
    margin-left: 0.3rem;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .next-item:hover .ni-sg-icon {
    opacity: 0.8;
  }

  .grid-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 6px;
  }

  .grid-scroll::-webkit-scrollbar {
    height: 4px;
  }
  .grid-scroll::-webkit-scrollbar-track {
    background: var(--surface);
  }
  .grid-scroll::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  .grid-milestone .ms-short { display: none; }

  /* ============================================================
     SHOT PANEL — slide-out from right
     ============================================================ */
  .shot-panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .shot-panel-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .shot-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 420px;
    max-width: 90vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .shot-panel.active {
    transform: translateX(0);
  }

  .shot-panel-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .shot-panel-header-info {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .shot-panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .shot-panel-subtitle {
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .shot-panel-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .shot-panel-close:hover {
    background: var(--surface-alt);
    color: var(--text);
    border-color: var(--text-muted);
  }

  .shot-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.5rem;
  }

  .shot-panel-body::-webkit-scrollbar {
    width: 4px;
  }
  .shot-panel-body::-webkit-scrollbar-track {
    background: var(--surface);
  }
  .shot-panel-body::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
  }

  /* Shot count summary */
  .shot-summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .shot-summary .count {
    color: var(--text);
    font-weight: 700;
    font-size: 1.1rem;
  }

  /* Individual shot card */
  .shot-card {
    display: flex;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(31, 35, 48, 0.5);
    align-items: flex-start;
  }

  .shot-card:last-child {
    border-bottom: none;
  }

  .shot-thumb {
    width: 80px;
    height: 45px;
    border-radius: 4px;
    background: var(--surface-alt);
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .shot-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .shot-thumb-empty {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .shot-info {
    flex: 1;
    min-width: 0;
  }

  .shot-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .shot-status {
    display: inline-block;
    margin-top: 0.3rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
  }

  .shot-status.status-ip     { background: rgba(78, 140, 255, 0.15); color: #6ea8ff; }
  .shot-status.status-wtg    { background: rgba(107, 112, 132, 0.15); color: var(--text-dim); }
  .shot-status.status-notes  { background: rgba(255, 170, 42, 0.15); color: var(--warn); }
  .shot-status.status-4rv    { background: rgba(45, 212, 160, 0.15); color: var(--ok); }
  .shot-status.status-bid    { background: rgba(107, 112, 132, 0.15); color: var(--text-dim); }
  .shot-status.status-sndexr { background: rgba(78, 140, 255, 0.12); color: var(--accent); }
  .shot-status.status-send   { background: rgba(45, 212, 160, 0.12); color: var(--ok); }
  .shot-status.status-awto   { background: rgba(107, 112, 132, 0.15); color: var(--text-dim); }
  .shot-status.status-exr2gb { background: rgba(78, 140, 255, 0.12); color: #6ea8ff; }
  .shot-status.status-gb4k   { background: rgba(45, 212, 160, 0.12); color: var(--ok); }
  .shot-status.status-wdl    { background: rgba(45, 212, 160, 0.12); color: var(--ok); }
  .shot-status.status-gdwip  { background: rgba(45, 212, 160, 0.10); color: var(--ok); }
  .shot-status.status-wipexr { background: rgba(255, 170, 42, 0.12); color: var(--warn); }
  .shot-status.status-issue  { background: rgba(255, 59, 78, 0.12); color: var(--crit); }
  .shot-status.status-default { background: rgba(107, 112, 132, 0.12); color: var(--text-dim); }

  .shot-desc {
    font-family: 'Outfit', sans-serif;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
    line-height: 1.3;
  }

  /* Loading spinner */
  .shot-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 0;
    gap: 1rem;
  }

  .shot-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .shot-loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Empty/error states */
  .shot-empty, .shot-error {
    text-align: center;
    padding: 2.5rem 1rem;
  }

  .shot-empty-icon, .shot-error-icon {
    font-size: 1.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  .shot-empty-text, .shot-error-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  .shot-error-text {
    color: var(--crit);
  }

  @media (max-width: 900px) {
    .cell .days { font-size: 1rem; }
    .cell .date { font-size: 0.5rem; }
    .grid-header, .grid-milestone { font-size: 0.6rem; padding: 0.4rem 0.5rem; }
    .grid { min-width: 480px; }
    .grid-milestone .ms-full { display: none; }
    .grid-milestone .ms-short { display: inline; }

    .shot-panel { width: 100vw; max-width: 100vw; }
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <header>
    <h1>GBVFX Deadlines</h1>
    <span class="clock" id="clock"></span>
  </header>

  <div id="global-next"></div>

  <div id="app"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--crit)"></div> 0–5 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--warn)"></div> 6–10 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div> 11–20 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--clear)"></div> 21+ days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--past-text)"></div> Past</div>
  </div>

  <div class="today-marker" id="today-label"></div>
</div>

<!-- Shot Panel Overlay -->
<div class="shot-panel-overlay" id="shotOverlay"></div>

<!-- Shot Panel -->
<div class="shot-panel" id="shotPanel">
  <div class="shot-panel-header">
    <div class="shot-panel-header-info">
      <div class="shot-panel-title" id="shotPanelTitle"></div>
      <div class="shot-panel-subtitle" id="shotPanelSubtitle"></div>
    </div>
    <button class="shot-panel-close" id="shotPanelClose">&times;</button>
  </div>
  <div class="shot-panel-body" id="shotPanelBody"></div>
</div>

<script>
// ============================================================

// ============================================================
const PROJECTS = [

  {

    milestones: [
      { name: "VFX Delivery",   dates: ["2026-04-10","2026-04-10"] },
    ]
  }
];

// UK Bank Holidays 2026 (add more years as needed)
const BANK_HOLIDAYS = [
  "2026-01-01", // New Year
  "2026-04-03", // Good Friday
  "2026-04-06", // Easter Monday
  "2026-05-04", // Early May Bank Holiday
  "2026-05-25", // Spring Bank Holiday
  "2026-08-31", // Summer Bank Holiday

  "2026-12-28", // Boxing Day (substitute)

// ============================================================
//  SHOTGRID INTEGRATION CONFIG
// ============================================================
const SHOTGRID_WEBHOOK = 'https://hook.eu1.make.com/s6x2g2rh1k02u61unukm8tny89xcouj2';

// Map dashboard project names → ShotGrid project IDs
const SG_PROJECT_MAP = {
  'Bloomers':             386,
  'Tall Tales & Murder':  287,
  'Tommy & Tuppence':     321,
  // 'Treasure Island':   TBD — add when set up in ShotGrid
};

// Map episode labels (EP1, EP3 etc.) → ShotGrid episode numbers
function epToSgNum(epLabel) {
  const n = parseInt(epLabel.replace('EP', ''), 10);
  return 100 + n; // EP1 → 101, EP3 → 103, etc.
}

// Map ShotGrid status short codes → display names
const SG_STATUS_NAMES = {
  'wtg':    'Waiting to Start',
  'ip':     'In Progress',
  'omt':    'Omit',
  'bid':    'Bidding',
  'exr':    'EXR Sent',
  '4rv':    'For Review',
  'sndexr': 'Send EXR',
  'notes':  'Notes',
  'fin':    'Final',
  'hld':    'On Hold',
  'gb4k':   'GB 4K Approved',
  'wdl':    'WDL Approved',
  'issue':  'Issue',
  'send':   'Good but not sent',
  'awto':   'Awaiting Turnover',
  'exr2gb': 'EXR 2 GB',
  'gdwip':  'Good WIP',
  'wipexr': 'WIP EXR Sent',
};

// ============================================================

function isWeekend(date) {
  const day = date.getDay();
  return day === 0 || day === 6;
}

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function isBankHoliday(date) {
  return BANK_HOLIDAYS.includes(toDateStr(date));
}

function workingDaysBetween(from, to) {
  if (from.getTime() === to.getTime()) return 0;

  const direction = to > from ? 1 : -1;
  let count = 0;
  const cursor = new Date(from);

  if (direction === 1) {
    cursor.setDate(cursor.getDate() + 1);
    while (cursor <= to) {
      if (!isWeekend(cursor) && !isBankHoliday(cursor)) count++;
      cursor.setDate(cursor.getDate() + 1);
    }
  } else {
    const c2 = new Date(to);
    c2.setDate(c2.getDate() + 1);
    while (c2 <= from) {
      if (!isWeekend(c2) && !isBankHoliday(c2)) count++;
      c2.setDate(c2.getDate() + 1);
    }
    count = -count;
  }

  return count;
}

function getToday() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}

function formatDate(isoStr) {
  const d = new Date(isoStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]}`;
}

function formatDayName(isoStr) {
  const d = new Date(isoStr + 'T00:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[d.getDay()];
}

function stateClass(wd) {
  if (wd < 0)  return 'past';
  if (wd <= 5) return 'crit';
  if (wd <= 10) return 'warn';
  if (wd <= 20) return 'ok';
  return 'clear';
}

function stateColor(wd) {
  if (wd < 0)   return 'var(--past-text)';
  if (wd <= 5)  return 'var(--crit)';
  if (wd <= 10) return 'var(--warn)';
  if (wd <= 20) return 'var(--ok)';
  return 'var(--clear)';
}

// ============================================================
//  SHOTGRID PANEL
// ============================================================
const shotPanel = document.getElementById('shotPanel');
const shotOverlay = document.getElementById('shotOverlay');
const shotPanelBody = document.getElementById('shotPanelBody');
const shotPanelTitle = document.getElementById('shotPanelTitle');
const shotPanelSubtitle = document.getElementById('shotPanelSubtitle');

function openShotPanel(projectName, ep) {
  const projectId = SG_PROJECT_MAP[projectName];
  if (!projectId) {
    shotPanelTitle.textContent = projectName;
    shotPanelSubtitle.textContent = ep;
    shotPanelBody.innerHTML = `
      <div class="shot-empty">
        <div class="shot-empty-icon">🔗</div>
        <div class="shot-empty-text">ShotGrid not connected for this project yet.</div>
      </div>`;
    shotPanel.classList.add('active');
    shotOverlay.classList.add('active');
    return;
  }

  const sgEp = epToSgNum(ep);
  shotPanelTitle.textContent = `${projectName}`;
  shotPanelSubtitle.textContent = `${ep} — Shot Status from ShotGrid`;

  // Show loading
  shotPanelBody.innerHTML = `
    <div class="shot-loading">
      <div class="shot-spinner"></div>
      <div class="shot-loading-text">Querying ShotGrid…</div>
    </div>`;

  shotPanel.classList.add('active');
  shotOverlay.classList.add('active');

  // Fetch from Make.com webhook
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 12000);

  fetch(SHOTGRID_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ project_id: projectId, project_name: projectName, episode: sgEp }),
    signal: controller.signal
  })
  .then(res => {
    clearTimeout(timeout);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  })
  .then(shots => {
    renderShots(shots);
  })
  .catch(err => {
    clearTimeout(timeout);
    const msg = err.name === 'AbortError'
      ? 'Request timed out. ShotGrid or Make.com may be unavailable.'
      : `Could not fetch shot data. ${err.message}`;
    shotPanelBody.innerHTML = `
      <div class="shot-error">
        <div class="shot-error-icon">⚠</div>
        <div class="shot-error-text">${msg}</div>
      </div>`;
  });
}

function renderShots(shots) {
  if (!shots || shots.length === 0) {
    shotPanelBody.innerHTML = `
      <div class="shot-empty">
        <div class="shot-empty-icon">✓</div>
        <div class="shot-empty-text">All shots delivered or omitted.<br>Nothing outstanding.</div>
      </div>`;
    return;
  }

  let html = `<div class="shot-summary"><span class="count">${shots.length}</span> shot${shots.length !== 1 ? 's' : ''} in progress</div>`;

  for (const shot of shots) {
    const attrs = shot.attributes || {};
    const code = attrs.code || 'Unknown';
    const status = attrs.sg_status_list || '';
    const statusName = SG_STATUS_NAMES[status] || status;
    const statusClass = `status-${status.replace(/[^a-z0-9]/g, '')}`;
    const imageUrl = attrs.image || null;
    const desc = attrs.description || '';

    html += `<div class="shot-card">`;

    // Thumbnail
    html += `<div class="shot-thumb">`;
    if (imageUrl) {
      html += `<img src="${imageUrl}" alt="${code}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=shot-thumb-empty>NO IMG</div>'">`;
    } else {
      html += `<div class="shot-thumb-empty">NO IMG</div>`;
    }
    html += `</div>`;

    // Info
    html += `<div class="shot-info">`;
    html += `<div class="shot-code">${code}</div>`;
    html += `<span class="shot-status ${statusClass} status-default">${statusName}</span>`;
    if (desc) {
      html += `<div class="shot-desc">${desc}</div>`;
    }
    html += `</div>`;

    html += `</div>`;
  }

  shotPanelBody.innerHTML = html;
}

function closeShotPanel() {
  shotPanel.classList.remove('active');
  shotOverlay.classList.remove('active');
}

document.getElementById('shotPanelClose').addEventListener('click', closeShotPanel);
shotOverlay.addEventListener('click', closeShotPanel);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeShotPanel();
});

// ============================================================
//  RENDER
// ============================================================

function renderNextUp(items, showProjectTag, limit) {
  let html = '';
  const sorted = items.slice().sort((a, b) => a.wd - b.wd);
  const shown = sorted.slice(0, limit);
  if (shown.length === 0) return '';

  for (const item of shown) {
    const col = stateColor(item.wd);
    const dayLabel = item.wd === 0 ? 'TODAY' : item.wd === 1 ? '1 day' : `${item.wd}d`;
    const hasSg = !!SG_PROJECT_MAP[item.project];
    const clickAttr = hasSg
      ? `onclick="openShotPanel('${item.project.replace(/'/g, "\\'")}', '${item.ep}')"`
      : '';
    const sgIcon = hasSg ? `<span class="ni-sg-icon" title="Click to view shot status">▸</span>` : '';

    html += `<div class="next-item" ${clickAttr}>`;
    html += `<span class="ni-days" style="color:${col}">${dayLabel}</span>`;
    html += `<span class="ni-detail"><strong>${item.ep} ${item.ms}</strong> · ${formatDayName(item.date)} ${formatDate(item.date)}`;
    if (showProjectTag) {
      html += `<span class="ni-tag">${item.project}</span>`;
    }
    html += `${sgIcon}</span></div>`;
  }
  return html;
}

function render() {
  const today = getToday();
  const app = document.getElementById('app');
  const globalNext = document.getElementById('global-next');
  let html = '';
  const allUpcoming = [];

  const sortedProjects = PROJECTS.slice().sort((a, b) => a.name.localeCompare(b.name));

  for (const project of sortedProjects) {
    const epCount = project.episodes.length;
    const cols = `100px repeat(${epCount}, 1fr)`;
    const projectUpcoming = [];

    html += `<div class="project-block">`;
    html += `<div class="project-title">${project.name}`;
    if (project.schedule) {
      html += `<span class="schedule-ref">${project.schedule}</span>`;
    }
    html += `</div>`;
    html += `<div class="grid-scroll">`;
    html += `<div class="grid" style="grid-template-columns: ${cols}">`;

    // Header row
    html += `<div class="grid-header"></div>`;
    for (const ep of project.episodes) {
      html += `<div class="grid-header" style="justify-content:center">${ep}</div>`;
    }

    // Milestone rows
    const shortNames = {
      'VFX Turnover': 'Turnover',
      'VFX Approvals': 'Approvals',
      'VFX Delivery': 'Delivery',
      'VFX Spot': 'Spot',
    };
    for (const ms of project.milestones) {
      const short = shortNames[ms.name] || ms.name;
      html += `<div class="grid-milestone"><span class="ms-full">${ms.name}</span><span class="ms-short">${short}</span></div>`;
      for (let i = 0; i < epCount; i++) {
        const isoDate = ms.dates[i];
        const target = new Date(isoDate + 'T00:00:00');
        const wd = workingDaysBetween(today, target);
        const cls = stateClass(wd);
        const displayDays = wd < 0 ? `${Math.abs(wd)}` : wd === 0 ? '0' : `${wd}`;
        const labelText = wd < 0 ? 'past' : wd === 0 ? 'TODAY' : wd === 1 ? 'day' : 'days';

        html += `<div class="cell ${cls}">`;
        html += `<span class="days">${displayDays}</span>`;
        html += `<span class="label">${labelText}</span>`;
        html += `<span class="date">${formatDate(isoDate)}</span>`;
        html += `</div>`;

        // Collect upcoming
        if (wd >= 0 && wd <= 60) {
          const entry = {
            wd, project: project.name,
            ep: project.episodes[i],
            ms: ms.name,
            date: isoDate
          };
          projectUpcoming.push(entry);
          allUpcoming.push(entry);
        }
      }
    }

    html += `</div></div>`;

    // Per-project Next Up
    const perProjectHtml = renderNextUp(projectUpcoming, false, 5);
    if (perProjectHtml) {
      html += `<div class="next-up">`;
      html += `<div class="next-up-title">Next Up</div>`;
      html += perProjectHtml;
      html += `</div>`;
    }

    html += `</div>`;
  }

  app.innerHTML = html;

  // Global Next Up (top of page, across all projects)
  const globalHtml = renderNextUp(allUpcoming, PROJECTS.length > 1, 10);
  if (globalHtml) {
    globalNext.innerHTML =
      `<div class="next-up global">` +
      `<div class="next-up-title">Next Up — All Projects</div>` +
      globalHtml +
      `</div>`;
  } else {
    globalNext.innerHTML = '';
  }

  // Today label
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-label').textContent =
    `Working days counted from ${days[today.getDay()]} ${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}, excl. weekends & UK bank holidays`;
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}

// Initial render
render();
updateClock();
setInterval(updateClock, 1000);
// Re-render at midnight
setInterval(() => {
  const now = new Date();
  if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() < 2) render();
}, 1000);
</script>
