<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBVFX — Deadline Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #12141a;
    --surface-alt: #181b23;
    --border: #1f2330;
    --text: #e2e4ea;
    --text-dim: #6b7084;
    --text-muted: #3d4155;
    --accent: #4e8cff;
    --past: #2a2d3a;
    --past-text: #3d4155;
    --crit: #ff3b4e;
    --crit-bg: rgba(255, 59, 78, 0.08);
    --warn: #ffaa2a;
    --warn-bg: rgba(255, 170, 42, 0.06);
    --ok: #2dd4a0;
    --ok-bg: rgba(45, 212, 160, 0.05);
    --clear: #4e8cff;
    --clear-bg: rgba(78, 140, 255, 0.05);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 0.5rem; }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 1.1rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--text);
  }

  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.05em;
  }

  .project-block { margin-top: 2rem; }

  .project-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 0.85rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.6rem;
  }

  .project-title::before {
    content: ''; display: inline-block;
    width: 8px; height: 8px; background: var(--accent); border-radius: 2px;
  }

  .schedule-ref {
    font-weight: 300; font-size: 0.65rem;
    letter-spacing: 0.04em; color: var(--text-muted); text-transform: none;
  }

  .grid {
    display: grid; gap: 1px; background: var(--border);
    border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
  }

  .grid-header {
    background: var(--surface-alt);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); padding: 0.6rem 0.75rem;
    display: flex; align-items: center;
  }

  .grid-milestone {
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 400; color: var(--text-dim);
    padding: 0.5rem 0.75rem; display: flex; align-items: center; white-space: nowrap;
  }

  .cell {
    background: var(--surface); padding: 0.4rem 0.5rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 54px; transition: background 0.2s;
  }
  .cell:hover { background: var(--surface-alt); }

  .cell .days {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 1.25rem; line-height: 1; letter-spacing: -0.02em;
  }
  .cell .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.05em; margin-top: 3px; opacity: 0.5;
  }
  .cell .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
  }

  .cell.past       { background: var(--past); }
  .cell.past .days, .cell.past .date, .cell.past .label { color: var(--past-text); }
  .cell.crit        { background: var(--crit-bg); }
  .cell.crit .days, .cell.crit .label { color: var(--crit); }
  .cell.warn        { background: var(--warn-bg); }
  .cell.warn .days, .cell.warn .label { color: var(--warn); }
  .cell.ok          { background: var(--ok-bg); }
  .cell.ok .days, .cell.ok .label { color: var(--ok); }
  .cell.clear       { background: var(--clear-bg); }
  .cell.clear .days, .cell.clear .label { color: var(--clear); }

  .today-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; color: var(--text-muted);
    letter-spacing: 0.05em; margin-top: 0.5rem;
  }

  .legend { display: flex; gap: 1.2rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .legend-item {
    display: flex; align-items: center; gap: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.05em;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .next-up {
    margin-top: 1.25rem; padding: 1rem 1.25rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  }

  /* Global sticky Next Up */
  #global-next:empty { display: none; }
  #global-next {
    position: sticky; top: 0; z-index: 100;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .next-up.global {
    border-color: #2a2e3d;
    background: linear-gradient(135deg, rgba(18,20,26,0.97) 0%, rgba(24,27,35,0.97) 100%);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-radius: 0 0 6px 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    margin-top: 0;
  }

  /* Global Next Up: two-column layout when shot panel is open */
  .global-inner { position: relative; }
  .global-left {
    flex: 1; min-width: 0;
  }
  .global-inner { position: relative; }
  .global-left { padding-right: 440px; }
  .global-right {
    width: 420px;
    display: none;
    border-left: 1px solid var(--border);
    padding-left: 1.25rem;
    overflow-y: auto;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
  }
  .global-right.open { display: block; }

  .global-right::-webkit-scrollbar { width: 4px; }
  .global-right::-webkit-scrollbar-track { background: transparent; }
  .global-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .shot-panel-header-inline {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0.6rem;
  }
  .shot-panel-title-inline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent);
  }
  .shot-panel-close-inline {
    background: none; border: none; color: var(--text-dim);
    font-size: 1.1rem; cursor: pointer; padding: 0.15rem 0.4rem;
    border-radius: 4px; line-height: 1; font-family: 'JetBrains Mono', monospace;
  }
  .shot-panel-close-inline:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .next-up-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 0.6rem;
  }

  .next-item { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.3rem 0; }
  .next-item .ni-days {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 1rem; min-width: 4ch; text-align: right;
  }
  .next-item .ni-detail {
    font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: var(--text-dim);
  }
  .next-item .ni-detail strong { color: var(--text); font-weight: 600; }

  .ni-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 3px;
    background: rgba(78,140,255,0.12); color: var(--accent); margin-left: 0.4rem;
  }

  .grid-scroll {
    overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 6px;
  }
  .grid-scroll::-webkit-scrollbar { height: 4px; }
  .grid-scroll::-webkit-scrollbar-track { background: var(--surface); }
  .grid-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .grid-milestone .ms-short { display: none; }

  .next-item.clickable { cursor: pointer; border-radius: 4px; padding: 0.3rem 0.4rem; margin: 0 -0.4rem; }
  .next-item.clickable:hover { background: rgba(78,140,255,0.08); }
  .next-item.clickable:active { background: rgba(78,140,255,0.14); }
  .next-item.active { background: rgba(78,140,255,0.12); }

  .shot-panel-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.05em;
  }
  .shot-spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .shot-panel-error {
    padding: 1.5rem 0.5rem; text-align: center; color: var(--crit);
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.03em;
  }
  .shot-panel-empty {
    padding: 1.5rem 0.5rem; text-align: center; color: var(--ok);
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.03em;
  }
  .shot-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem; color: var(--text-dim);
    letter-spacing: 0.05em; margin-bottom: 0.6rem;
    padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
  }

  .shot-card {
    display: flex; gap: 0.6rem; align-items: flex-start;
    padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  }
  .shot-card:last-child { border-bottom: none; }

  .shot-thumb {
    width: 64px; height: 38px; border-radius: 3px;
    background: var(--surface-alt); object-fit: cover;
    flex-shrink: 0; border: 1px solid var(--border);
  }
  .shot-thumb-placeholder {
    width: 64px; height: 38px; border-radius: 3px;
    background: var(--surface-alt); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.45rem;
    color: var(--text-muted); border: 1px solid var(--border);
  }

  .shot-info { flex: 1; min-width: 0; }
  .shot-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; font-weight: 600; color: var(--text); letter-spacing: 0.02em;
  }
  .shot-desc {
    font-family: 'Outfit', sans-serif; font-size: 0.65rem; color: var(--text-dim);
    margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .shot-no-exr {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--crit); margin-top: 0.15rem;
  }

  .shot-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 5px; border-radius: 3px;
    flex-shrink: 0; align-self: center;
  }

  @media (max-width: 900px) {
    .cell .days { font-size: 1rem; }
    .cell .date { font-size: 0.5rem; }
    .grid-header, .grid-milestone { font-size: 0.6rem; padding: 0.4rem 0.5rem; }
    .grid { min-width: 480px; }
    .grid-milestone .ms-full { display: none; }
    .grid-milestone .ms-short { display: inline; }
    .global-inner { flex-direction: column; }
    .global-right { width: 100%; border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 0.75rem; max-height: 50vh; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div id="global-next"></div>

<div class="container">
  <header>
    <h1>GBVFX Deadlines</h1>
    <span class="clock" id="clock"></span>
  </header>
  <div id="app"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--crit)"></div> 0–5 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--warn)"></div> 6–10 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div> 11–20 days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--clear)"></div> 21+ days</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--past-text)"></div> Past</div>
  </div>
  <div class="today-marker" id="today-label"></div>
</div>

<script>
var PROJECTS = [
  {
    name: "Treasure Island",
    schedule: "TREA Post Production Schedule_V2_170326",
    episodes: ["EP1","EP2","EP3","EP4","EP5","EP6"],
    milestones: [
      { name: "Lock",           dates: ["2026-04-02","2026-04-21","2026-05-27","2026-05-01","2026-05-18","2026-06-19"] },
      { name: "VFX Turnover",   dates: ["2026-04-07","2026-04-22","2026-05-28","2026-05-05","2026-05-19","2026-06-22"] },
      { name: "Conform",        dates: ["2026-04-08","2026-04-23","2026-05-29","2026-05-06","2026-05-20","2026-06-23"] },
      { name: "VFX Spot",       dates: ["2026-04-10","2026-04-27","2026-06-02","2026-05-08","2026-05-22","2026-06-26"] },
      { name: "VFX Approvals",  dates: ["2026-06-02","2026-06-09","2026-07-14","2026-06-30","2026-07-07","2026-08-18"] },
      { name: "VFX Delivery",   dates: ["2026-06-05","2026-06-12","2026-07-17","2026-07-03","2026-07-10","2026-08-21"] },
      { name: "Grade",          dates: ["2026-06-08","2026-06-15","2026-07-21","2026-07-07","2026-07-13","2026-08-25"] },
    ]
  },
  {
    name: "Tall Tales & Murder",
    episodes: ["EP3","EP4","EP5","EP6"],
    milestones: [
      { name: "VFX Delivery", dates: ["2026-03-20","2026-03-20","2026-03-26","2026-03-26"] },
      { name: "Grade",        dates: ["2026-03-24","2026-03-24","2026-03-30","2026-03-30"] },
    ]
  },
  {
    name: "Tommy & Tuppence",
    episodes: ["EP3","EP4","EP5","EP6"],
    milestones: [
      { name: "VFX Delivery", dates: ["2026-03-19","2026-03-19","2026-03-23","2026-03-26"] },
    ]
  },
  {
    name: "Bloomers",
    episodes: ["EP3","EP4"],
    milestones: [
      { name: "VFX Delivery", dates: ["2026-04-10","2026-04-10"] },
    ]
  }
];

var BANK_HOLIDAYS = [
  "2026-01-01","2026-04-03","2026-04-06","2026-05-04",
  "2026-05-25","2026-08-31","2026-12-25","2026-12-28",
];

var SHOTGRID_WEBHOOK = 'https://hook.eu1.make.com/s6x2g2rh1k02u61unukm8tny89xcouj2';
var SG_PROJECT_MAP = {
  'Bloomers':            { id: 386 },
  'Tall Tales & Murder': { id: 287 },
  'Tommy & Tuppence':    { id: 321 },
  'Treasure Island':     { id: null },
};
var SG_STATUS_LABELS = {
  wtg:'Waiting to Start', ip:'In Progress', bid:'Bidding',
  '4rv':'For Review', sndexr:'Send EXR', notes:'Notes',
  gb4k:'GB 4K Approved', wdl:'WDL Approved', issue:'Issue',
  send:'Good but not sent', awto:'Awaiting Turnover',
  exr2gb:'EXR 2 GB', gdwip:'Good WIP', wipexr:'WIP EXR Sent',
};
var SG_STATUS_COLORS = {
  ip:     { bg:'rgba(100,220,140,0.12)', text:'#64dc8c' },
  notes:  { bg:'rgba(255,59,78,0.12)',   text:'#ff3b4e' },
  issue:  { bg:'rgba(255,59,78,0.15)',   text:'#ff3b4e' },
  send:   { bg:'rgba(255,170,42,0.12)',  text:'#ffaa2a' },
  '4rv':  { bg:'rgba(255,220,50,0.12)',  text:'#ffdc32' },
  gdwip:  { bg:'rgba(100,220,140,0.08)', text:'#64dc8c' },
  awto:   { bg:'rgba(255,255,255,0.06)', text:'#6b7084' },
  bid:    { bg:'rgba(120,180,255,0.12)', text:'#78b4ff' },
  sndexr: { bg:'rgba(255,170,42,0.10)',  text:'#ffaa2a' },
  wipexr: { bg:'rgba(100,220,140,0.08)', text:'#64dc8c' },
  wtg:    { bg:'rgba(255,255,255,0.06)', text:'#6b7084' },
};

function isWeekend(d){ return d.getDay()===0||d.getDay()===6; }
function toDateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function isBankHoliday(d){ return BANK_HOLIDAYS.indexOf(toDateStr(d))!==-1; }

function workingDaysBetween(from, to) {
  if(from.getTime()===to.getTime()) return 0;
  var dir=to>from?1:-1, count=0;
  if(dir===1){ var c=new Date(from); c.setDate(c.getDate()+1); while(c<=to){ if(!isWeekend(c)&&!isBankHoliday(c)) count++; c.setDate(c.getDate()+1); } }
  else { var c=new Date(to); c.setDate(c.getDate()+1); while(c<=from){ if(!isWeekend(c)&&!isBankHoliday(c)) count++; c.setDate(c.getDate()+1); } count=-count; }
  return count;
}

function getToday(){ var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function formatDate(s){ var d=new Date(s+'T00:00:00'); var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return d.getDate()+' '+m[d.getMonth()]; }
function formatDayName(s){ var d=new Date(s+'T00:00:00'); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
function stateClass(w){ if(w<0) return 'past'; if(w<=5) return 'crit'; if(w<=10) return 'warn'; if(w<=20) return 'ok'; return 'clear'; }
function stateColor(w){ if(w<0) return 'var(--past-text)'; if(w<=5) return 'var(--crit)'; if(w<=10) return 'var(--warn)'; if(w<=20) return 'var(--ok)'; return 'var(--clear)'; }

var activeNextItem = null;

function renderNextUp(items, showProjectTag, limit) {
  var html='';
  var sorted=items.slice().sort(function(a,b){return a.wd-b.wd;});
  var shown=sorted.slice(0,limit);
  if(!shown.length) return '';
  for(var i=0;i<shown.length;i++){
    var item=shown[i];
    var col=stateColor(item.wd);
    var dayLabel=item.wd===0?'TODAY':item.wd===1?'1 day':item.wd+'d';
    var sg=SG_PROJECT_MAP[item.project];
    var hasShot=sg&&sg.id!==null;
    var epNum=parseInt(item.ep.replace(/\D/g,''),10);
    var epCode=epNum<100?100+epNum:epNum;
    var itemId=item.project.replace(/\W/g,'')+'-'+item.ep+'-'+item.ms.replace(/\W/g,'');
    var click=hasShot?' onclick="openShotPanel(this,\''+item.project.replace(/'/g,"\\'")+'\','+sg.id+','+epCode+',\''+item.ep+'\',\''+item.ms+'\')" ':'';
    var cls=hasShot?' clickable':'';
    html+='<div class="next-item'+cls+'" data-id="'+itemId+'"'+click+'>';
    html+='<span class="ni-days" style="color:'+col+'">'+dayLabel+'</span>';
    html+='<span class="ni-detail"><strong>'+item.ep+' '+item.ms+'</strong> · '+formatDayName(item.date)+' '+formatDate(item.date);
    if(showProjectTag) html+='<span class="ni-tag">'+item.project+'</span>';
    html+='</span></div>';
  }
  return html;
}

function render() {
  var today=getToday();
  var app=document.getElementById('app');
  var globalNext=document.getElementById('global-next');
  var html='';
  var allUpcoming=[];
  var sortedProjects=PROJECTS.slice().sort(function(a,b){return a.name.localeCompare(b.name);});

  for(var p=0;p<sortedProjects.length;p++){
    var project=sortedProjects[p];
    var epCount=project.episodes.length;
    var cols='100px repeat('+epCount+', 1fr)';
    var projectUpcoming=[];
    html+='<div class="project-block">';
    html+='<div class="project-title">'+project.name;
    if(project.schedule) html+='<span class="schedule-ref">'+project.schedule+'</span>';
    html+='</div>';
    html+='<div class="grid-scroll"><div class="grid" style="grid-template-columns: '+cols+'">';
    html+='<div class="grid-header"></div>';
    for(var e=0;e<project.episodes.length;e++) html+='<div class="grid-header" style="justify-content:center">'+project.episodes[e]+'</div>';

    var shortNames={'VFX Turnover':'Turnover','VFX Approvals':'Approvals','VFX Delivery':'Delivery','VFX Spot':'Spot'};
    for(var m=0;m<project.milestones.length;m++){
      var ms=project.milestones[m];
      var short=shortNames[ms.name]||ms.name;
      html+='<div class="grid-milestone"><span class="ms-full">'+ms.name+'</span><span class="ms-short">'+short+'</span></div>';
      for(var i=0;i<epCount;i++){
        var isoDate=ms.dates[i];
        var target=new Date(isoDate+'T00:00:00');
        var wd=workingDaysBetween(today,target);
        var cls=stateClass(wd);
        var displayDays=wd<0?Math.abs(wd):wd===0?'0':wd;
        var labelText=wd<0?'past':wd===0?'TODAY':wd===1?'day':'days';
        html+='<div class="cell '+cls+'"><span class="days">'+displayDays+'</span><span class="label">'+labelText+'</span><span class="date">'+formatDate(isoDate)+'</span></div>';
        if(wd>=0&&wd<=60){
          var entry={wd:wd,project:project.name,ep:project.episodes[i],ms:ms.name,date:isoDate};
          projectUpcoming.push(entry); allUpcoming.push(entry);
        }
      }
    }
    html+='</div></div>';
    var ppHtml=renderNextUp(projectUpcoming,false,5);
    if(ppHtml) html+='<div class="next-up"><div class="next-up-title">Next Up</div>'+ppHtml+'</div>';
    html+='</div>';
  }

  app.innerHTML=html;

  var globalHtml=renderNextUp(allUpcoming,PROJECTS.length>1,10);
  if(globalHtml){
    globalNext.innerHTML='<div class="next-up global"><div class="global-inner">'
      +'<div class="global-left">'
      +'<div class="next-up-title">Next Up — All Projects</div>'
      +globalHtml
      +'</div>'
      +'<div class="global-right" id="shot-inline-panel"></div>'
      +'</div></div>';
  } else {
    globalNext.innerHTML='';
  }

  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('today-label').textContent='Working days counted from '+days[today.getDay()]+' '+today.getDate()+' '+months[today.getMonth()]+' '+today.getFullYear()+', excl. weekends & UK bank holidays';
}

function updateClock(){
  var n=new Date();
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

render(); updateClock();
setInterval(updateClock,1000);
setInterval(function(){ var n=new Date(); if(n.getHours()===0&&n.getMinutes()===0&&n.getSeconds()<2) render(); },1000);

// ============================================================
//  SHOTGRID — INLINE PANEL
// ============================================================
var shotAbort=null;

function openShotPanel(el,projectName,projectId,episode,epLabel,milestone){
  var panel=document.getElementById('shot-inline-panel');
  if(!panel) return;

  // Highlight active item
  var prev=document.querySelector('.next-item.active');
  if(prev) prev.classList.remove('active');
  el.classList.add('active');

  panel.classList.add('open');
  panel.innerHTML='<div class="shot-panel-header-inline">'
    +'<span class="shot-panel-title-inline">'+projectName+' — '+epLabel+'</span>'
    +'<button class="shot-panel-close-inline" onclick="closeShotPanel()">&times;</button>'
    +'</div>'
    +'<div class="shot-panel-loading"><div class="shot-spinner"></div>Querying ShotGrid…</div>';

  if(shotAbort) shotAbort.abort();
  shotAbort=new AbortController();
  var timeout=setTimeout(function(){shotAbort.abort();},12000);

  fetch(SHOTGRID_WEBHOOK,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({project_id:projectId,project_name:projectName,episode:episode}),
    signal:shotAbort.signal,
  })
  .then(function(r){ clearTimeout(timeout); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(data){
    var header='<div class="shot-panel-header-inline">'
      +'<span class="shot-panel-title-inline">'+projectName+' — '+epLabel+'</span>'
      +'<button class="shot-panel-close-inline" onclick="closeShotPanel()">&times;</button>'
      +'</div>';
    panel.innerHTML=header+renderShotData(data);
  })
  .catch(function(err){
    clearTimeout(timeout);
    var header='<div class="shot-panel-header-inline">'
      +'<span class="shot-panel-title-inline">'+projectName+' — '+epLabel+'</span>'
      +'<button class="shot-panel-close-inline" onclick="closeShotPanel()">&times;</button>'
      +'</div>';
    if(err.name==='AbortError') panel.innerHTML=header+'<div class="shot-panel-error">Request timed out.</div>';
    else panel.innerHTML=header+'<div class="shot-panel-error">Could not reach ShotGrid.<br>'+err.message+'</div>';
  });
}

function closeShotPanel(){
  var panel=document.getElementById('shot-inline-panel');
  if(panel){ panel.classList.remove('open'); panel.innerHTML=''; }
  var prev=document.querySelector('.next-item.active');
  if(prev) prev.classList.remove('active');
  if(shotAbort){shotAbort.abort();shotAbort=null;}
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeShotPanel();});

function renderShotData(shots){
  if(!shots||!shots.length){
    return '<div class="shot-panel-empty">All shots delivered or omitted ✓</div>';
  }

  shots.sort(function(a,b){
    var ca=(a.attributes?a.attributes.code:a.code)||'';
    var cb=(b.attributes?b.attributes.code:b.code)||'';
    return ca.localeCompare(cb,undefined,{numeric:true});
  });

  var missingExr=0;
  for(var i=0;i<shots.length;i++){
    var a=shots[i].attributes||shots[i];
    if(!a.sg_exr_2_vendor) missingExr++;
  }

  var html='<div class="shot-count">'+shots.length+' shot'+(shots.length!==1?'s':'')+' remaining';
  if(missingExr>0) html+=' · <span style="color:var(--crit)">'+missingExr+' no EXR date</span>';
  html+='</div>';

  for(var i=0;i<shots.length;i++){
    var shot=shots[i];
    var attrs=shot.attributes||shot;
    var code=attrs.code||'Unknown';
    var status=attrs.sg_status_list||'??';
    var desc=attrs.description||'';
    var img=attrs.image||null;
    var exrVendor=attrs.sg_exr_2_vendor||null;
    var label=SG_STATUS_LABELS[status]||status.toUpperCase();
    var colors=SG_STATUS_COLORS[status]||{bg:'rgba(255,255,255,0.06)',text:'#6b7084'};

    html+='<div class="shot-card">';
    if(img) html+='<img class="shot-thumb" src="'+img+'" alt="'+code+'" loading="lazy" onerror="this.outerHTML=\'<div class=\\\'shot-thumb-placeholder\\\'>NO IMG</div>\'">';
    else html+='<div class="shot-thumb-placeholder">NO IMG</div>';
    html+='<div class="shot-info"><div class="shot-code">'+code+'</div>';
    if(desc) html+='<div class="shot-desc" title="'+desc.replace(/"/g,'&quot;')+'">'+desc+'</div>';
    if(!exrVendor) html+='<div class="shot-no-exr">⚠ NO EXR DATE</div>';
    html+='</div>';
    html+='<span class="shot-badge" style="background:'+colors.bg+';color:'+colors.text+'">'+label+'</span>';
    html+='</div>';
  }

  return html;
}
</script>
